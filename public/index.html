<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Engineering Pack — Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fade-up { animation: fadeUp 0.6s ease-out forwards; }
</style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen flex items-center justify-center text-white">
<div class="max-w-md w-full mx-4">
  <!-- Product Card -->
  <div class="bg-gray-800/60 backdrop-blur-xl border border-gray-700 rounded-2xl p-6 animate-fade-up">
    <div class="flex items-center gap-4 mb-6">
      <div class="w-16 h-16 bg-gradient-to-br from-orange-500 to-red-600 rounded-xl flex items-center justify-center text-2xl font-bold">
        AI
      </div>
      <div>
        <h1 class="text-xl font-bold">AI Prompt Engineering Pack</h1>
        <p class="text-gray-400 text-sm">3000+ premium prompts</p>
      </div>
    </div>
    
    <div class="space-y-3 mb-6">
      <div class="flex items-center gap-3 text-sm text-gray-300">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        3000+ battle-tested prompts
      </div>
      <div class="flex items-center gap-3 text-sm text-gray-300">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        1-click copy format
      </div>
      <div class="flex items-center gap-3 text-sm text-gray-300">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Lifetime updates
      </div>
    </div>
    
    <div class="flex items-baseline gap-2 mb-2">
      <span class="text-3xl font-bold">$17</span>
      <span class="text-gray-400 line-through">$49</span>
      <span class="text-green-400 text-sm">65% OFF</span>
    </div>
    
    <p class="text-xs text-gray-500 mb-6">One-time purchase. Instant download.</p>
    
    <button onclick="startCheckout()" id="buyBtn" class="w-full bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 py-4 rounded-xl font-bold text-lg transition-all transform hover:scale-[1.02] active:scale-[0.98]">
      Buy Now — $17
    </button>
    
    <div class="flex items-center justify-center gap-2 mt-4 text-xs text-gray-500">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Secured by Stripe
    </div>
  </div>
</div>

<script>
const STRIPE_PUBLIC_KEY = 'pk_test_YOUR_KEY_HERE'; // Replace with your Stripe test key

async function startCheckout() {
  const btn = document.getElementById('buyBtn');
  btn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
  btn.disabled = true;
  
  try {
    // Option 1: Redirect to Stripe Checkout (server-side session)
    // We'll implement this via our worker
    
    const response = await fetch('https://payment-worker.YOUR_SUBDOMAIN.workers.dev/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        product: 'ai-prompt-pack',
        price: 1700, // cents
        currency: 'usd',
        customer_email: null
      })
    });
    
    const { url } = await response.json();
    window.location.href = url;
    
  } catch (err) {
    btn.innerHTML = 'Buy Now — $17';
    btn.disabled = false;
    alert('Checkout failed: ' + err.message);
  }
}
</script>
</body>
</html>
